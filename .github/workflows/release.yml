name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — test everything without releasing'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Unit Tests
        run: dotnet test tests/Nanov.OpenTelemetry.Summary.Tests -c Release --no-build

      - name: Integration Tests
        run: dotnet test tests/Nanov.OpenTelemetry.Summary.IntegrationTests -c Release --no-build

  release:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version
        id: version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v
          dry_run: true

      - name: Update version in Directory.Build.props
        run: |
          sed -i "s|<Version>.*</Version>|<Version>${{ steps.version.outputs.new_version }}</Version>|" Directory.Build.props

      - name: Check for previous tags
        id: has_tags
        run: |
          if git describe --tags --abbrev=0 2>/dev/null; then
            echo "EXISTS=true" >> $GITHUB_OUTPUT
          else
            echo "EXISTS=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate changelog
        id: changelog
        if: steps.has_tags.outputs.EXISTS == 'true'
        uses: requarks/changelog-action@v1
        with:
          token: ${{ github.token }}
          tag: ${{ steps.version.outputs.new_tag }}
          writeToFile: true
          changelogFilePath: CHANGELOG.md
          excludeTypes: build,docs,style,other
          includeRefIssues: true
          useGitmojis: false

      - name: Initial changelog
        if: steps.has_tags.outputs.EXISTS == 'false'
        run: |
          echo -e "# Changelog\n\n## [${{ steps.version.outputs.new_version }}] - $(date +%Y-%m-%d)\n\nInitial release." > CHANGELOG.md
          echo "changes=Initial release." >> $GITHUB_OUTPUT
        id: initial_changelog

      - name: Commit version and changelog
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Directory.Build.props CHANGELOG.md
          git commit -m "chore: release v${{ steps.version.outputs.new_version }}"
          git push origin main

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: |
          echo "### Dry Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ steps.version.outputs.new_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Bump:** ${{ steps.version.outputs.release_type }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Changelog" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.changelog.outputs.changes || steps.initial_changelog.outputs.changes }}" >> $GITHUB_STEP_SUMMARY

      - name: Create tag and GitHub Release
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.new_tag }}
          name: v${{ steps.version.outputs.new_version }}
          body: ${{ steps.changelog.outputs.changes || steps.initial_changelog.outputs.changes }}
          target_commitish: main
